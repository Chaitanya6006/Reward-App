name: Stellar Task Reward CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  soroban:
    name: Soroban Contracts CI
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-A unexpected_cfgs"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: |
          for dir in achievement_nft leaderboard_contract task_contract token_contract; do
            echo "Formatting $dir..."
            (cd contracts/$dir && cargo fmt --all -- --check)
          done

      - name: Run Clippy
        run: |
          for dir in achievement_nft leaderboard_contract task_contract token_contract; do
            echo "Clippy $dir..."
            (cd contracts/$dir && cargo clippy --all-targets --all-features -- -D warnings)
          done

      - name: Run Tests
        run: |
          for dir in achievement_nft leaderboard_contract task_contract token_contract; do
            echo "Test $dir..."
            (cd contracts/$dir && cargo test)
          done

      - name: Build WASM
        run: |
          for dir in achievement_nft leaderboard_contract task_contract token_contract; do
            echo "Building $dir..."
            (cd contracts/$dir && cargo build --target wasm32-unknown-unknown --release)
          done
  
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
